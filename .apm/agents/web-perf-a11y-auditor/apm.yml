name: web-perf-a11y-auditor
version: 1.0.0
description: >-
  Orchestrator agent for web performance and accessibility auditing.
  Coordinates MCP tools (Chrome DevTools, a11y-mcp) and associated skills
  to run Lighthouse audits, analyse Core Web Vitals, detect WCAG violations,
  inspect network and rendering performance, and produce structured reports
  with evidence and actionable remediation steps.
target: all

dependencies:
  apm:
    - ChromeDevTools/chrome-devtools-mcp/skills/chrome-devtools
    - ChromeDevTools/chrome-devtools-mcp/skills/chrome-devtools-cli
    - ChromeDevTools/chrome-devtools-mcp/skills/a11y-debugging
    - ChromeDevTools/chrome-devtools-mcp/skills/debug-optimize-lcp
    - ChromeDevTools/chrome-devtools-mcp/skills/memory-leak-debugging
    - ChromeDevTools/chrome-devtools-mcp/skills/troubleshooting
